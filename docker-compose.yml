version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: inventory-db

    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: ./backend
    container_name: inventory-backend

    ports:
      - "5000:5000"

    depends_on:
      - postgres

    env_file:
      - ./backend/.env


  frontend:
    build: ./frontend
    container_name: inventory-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend


volumes:
  postgres_data: