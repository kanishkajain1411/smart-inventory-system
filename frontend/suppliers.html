                <a href="users.html"

        <!-- Main -->
        <main class="flex-1 p-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-6">Supplier Management</h1>

            <!-- Add New Supplier -->
            <section class="bg-white rounded-xl shadow-sm p-8 mb-8">
                <h2 class="text-xl font-bold text-slate-800 mb-6">Add New Supplier</h2>

                <form id="supplierForm" class="space-y-5" onsubmit="return addSupplier(event)">
                    <input type="text" id="supName" placeholder="Supplier Name" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">

                    <input type="text" id="supContact" placeholder="Contact Person"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">

                    <input type="tel" id="supPhone" placeholder="Phone Number"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">

                    <input type="email" id="supEmail" placeholder="Email Address"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">

                    <textarea id="supAddress" placeholder="Address" rows="3"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>

                    <div class="flex items-center gap-4">
                        <select id="supStatus"
                            class="border border-slate-300 rounded-lg px-3 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option>Active</option>
                            <option>Inactive</option>
                        </select>

                        <button type="submit"
                            class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-6 4l3 3m0 0l3-3m-3 3V2" />
                            </svg>
                            Save Supplier
                        </button>
                    </div>
                </form>
            </section>

            <!-- Suppliers List -->
            <section class="bg-white rounded-xl shadow-sm p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Suppliers List</h2>
                    <input type="text" id="searchInput" placeholder="Search Supplier..." onkeyup="filterTable()"
                        class="border border-slate-300 rounded-lg px-4 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 text-sm">
                                <th class="px-4 py-3 font-semibold">ID</th>
                                <th class="px-4 py-3 font-semibold">Name</th>
                                <th class="px-4 py-3 font-semibold">Contact Person</th>
                                <th class="px-4 py-3 font-semibold">Phone</th>
                                <th class="px-4 py-3 font-semibold">Email</th>
                                <th class="px-4 py-3 font-semibold">Status</th>
                                <th class="px-4 py-3 font-semibold">Action</th>
                            </tr>
                        </thead>
                        <tbody id="supplierTableBody" class="divide-y divide-slate-100">
                            <!-- Rows will be added here dynamically from database -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";

        let editId = null;


        // ================= LOAD SUPPLIERS =================

        function loadSuppliers() {

            fetch(`${API_URL}/suppliers`)
                .then(res => res.json())
                .then(suppliers => {

                    const tbody = document.getElementById("supplierTableBody");

                    tbody.innerHTML = "";


                    suppliers.forEach(supplier => {


                        tbody.innerHTML += `

            <tr>

                <td class="px-4 py-4">
                    ${supplier.id}
                </td>


                <td class="px-4 py-4 font-medium">
                    ${supplier.name}
                </td>


                <td class="px-4 py-4">
                    ${supplier.contact_person || "-"}
                </td>


                <td class="px-4 py-4">
                    ${supplier.phone || "-"}
                </td>


                <td class="px-4 py-4">
                    ${supplier.email || "-"}
                </td>


                <td class="px-4 py-4">
                    <span class="text-green-600 font-medium">
                        ${supplier.status}
                    </span>
                </td>


                <td class="px-4 py-4">


                    <button 
                    onclick="editSupplier(${supplier.id})"
                    class="bg-yellow-400 text-white px-3 py-1 rounded mr-2">
                    Edit
                    </button>


                    <button 
                    onclick="deleteSupplier(${supplier.id})"
                    class="bg-red-500 text-white px-3 py-1 rounded">
                    Delete
                    </button>


                </td>


            </tr>

            `;


                    });


                })

                .catch(err => {

                    console.log(err);

                });


        }




        // ================= ADD / UPDATE SUPPLIER =================


        function addSupplier(e) {

            e.preventDefault();


            let data = {


                name:
                    document.getElementById("supName").value,


                contact_person:
                    document.getElementById("supContact").value,


                phone:
                    document.getElementById("supPhone").value,


                email:
                    document.getElementById("supEmail").value,


                address:
                    document.getElementById("supAddress").value,


                status:
                    document.getElementById("supStatus").value


            };



            let url = `${API_URL}/suppliers`;

            let method = "POST";



            if (editId) {


                url = `${API_URL}/suppliers/${editId}`;

                method = "PUT";


            }



            fetch(url, {

                method: method,


                headers: {

                    "Content-Type": "application/json"

                },


                body: JSON.stringify(data)


            })


                .then(res => res.json())


                .then(result => {


                    alert(result.message);


                    document.getElementById("supplierForm").reset();


                    editId = null;


                    loadSuppliers();


                })


                .catch(error => {


                    console.log(error);

                    alert("Supplier save failed");


                });



        }




        // ================= DELETE =================


        function deleteSupplier(id) {


            if (confirm("Delete this supplier?")) {


                fetch(`${API_URL}/suppliers/${id}`, {


                    method: "DELETE"


                })


                    .then(res => res.json())


                    .then(data => {


                        alert(data.message);


                        loadSuppliers();


                    });


            }


        }





        // ================= EDIT =================


        function editSupplier(id) {


            fetch(`${API_URL}/suppliers/${id}`)


                .then(res => res.json())


                .then(supplier => {


                    editId = id;


                    document.getElementById("supName").value =
                        supplier.name;


                    document.getElementById("supContact").value =
                        supplier.contact_person || "";


                    document.getElementById("supPhone").value =
                        supplier.phone || "";


                    document.getElementById("supEmail").value =
                        supplier.email || "";


                    document.getElementById("supAddress").value =
                        supplier.address || "";


                    document.getElementById("supStatus").value =
                        supplier.status;



                });



        }





        // ================= SEARCH =================


        function filterTable() {


            let search = document
                .getElementById("searchInput")
                .value
                .toLowerCase();



            document.querySelectorAll("#supplierTableBody tr")

                .forEach(row => {


                    row.style.display =

                        row.innerText
                            .toLowerCase()
                            .includes(search)

                            ?

                            ""

                            :

                            "none";


                });


        }




        // ================= PAGE LOAD =================


        window.onload = function () {

            loadSuppliers();

        }
    </script>

</body>
