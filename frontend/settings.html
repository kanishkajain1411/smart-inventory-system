<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        navy: '#0f172a'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        ::placeholder {
            color: #94a3b8;
        }
    </style>
</head>

<body class="bg-slate-100">

    <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside class="w-60 bg-navy text-white flex flex-col shrink-0">
            <div class="flex items-center gap-2 px-6 py-6">
                <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center font-bold text-lg">S</div>
                <span class="font-bold text-lg">Smart Inventory</span>
            </div>

            <nav class="flex-1 px-4 space-y-1 mt-2">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-white/5 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 012-2h2a2 2 0 012 2v6m-6 0h6m-6 0H5a2 2 0 01-2-2V5a2 2 0 012-2h4l2 2h6a2 2 0 012 2v10a2 2 0 01-2 2h-2" />
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="products.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-white/5 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                    <span>Products</span>
                </a>
                <a href="categories.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-white/5 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    <span>Categories</span>
                </a>
                <a href="suppliers.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-white/5 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 16.5V15a2 2 0 012-2h2m0-2V9a2 2 0 012-2h6a2 2 0 012 2v2m0 2h2a2 2 0 012 2v1.5M5 19.5h14a1 1 0 001-1v-1a1 1 0 00-1-1H5a1 1 0 00-1 1v1a1 1 0 001 1z" />
                    </svg>
                    <span>Suppliers</span>
                </a>
                <a href="orders.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-white/5 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <span>Orders</span>
                </a>
                <a href="users.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-white/5 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-3.13a4 4 0 10-4-4 4 4 0 004 4zm6 0a4 4 0 10-4-4" />
                    </svg>
                    <span>Users</span>
                </a>
                <a href="settings.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-600 text-white font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-6">Settings</h1>

            <!-- General Settings -->
            <section class="bg-white rounded-xl shadow-sm p-8 mb-8">
                <h2 class="text-xl font-bold text-slate-800 mb-6">General Settings</h2>

                <form id="generalForm" class="space-y-5" onsubmit="return saveGeneral(event)">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1.5">Company Name</label>
                        <input type="text" id="companyName" placeholder="Company Name"
                            class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1.5">Contact Email</label>
                        <input type="email" id="companyEmail" placeholder="Contact Email"
                            class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">Currency</label>
                            <select id="currency"
                                class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="INR">₹ INR - Indian Rupee</option>
                                <option value="USD">$ USD - US Dollar</option>
                                <option value="EUR">€ EUR - Euro</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">Low Stock Alert
                                Threshold</label>
                            <input type="number" id="lowStock" placeholder="e.g. 5" min="0"
                                class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                    </div>

                    <button type="submit"
                        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-6 4l3 3m0 0l3-3m-3 3V2" />
                        </svg>
                        Save Changes
                    </button>
                    <span id="generalSavedMsg" class="hidden ml-3 text-emerald-600 text-sm font-medium">Saved!</span>
                </form>
            </section>

            <!-- Notification Settings -->
            <section class="bg-white rounded-xl shadow-sm p-8 mb-8">
                <h2 class="text-xl font-bold text-slate-800 mb-6">Notification Settings</h2>

                <div class="space-y-4">
                    <label class="flex items-center justify-between py-2">
                        <span class="text-slate-700">Email me on low stock</span>
                        <input type="checkbox" checked class="w-5 h-5 accent-blue-600">
                    </label>
                    <label class="flex items-center justify-between py-2 border-t border-slate-100 pt-4">
                        <span class="text-slate-700">Email me on new orders</span>
                        <input type="checkbox" checked class="w-5 h-5 accent-blue-600">
                    </label>
                    <label class="flex items-center justify-between py-2 border-t border-slate-100 pt-4">
                        <span class="text-slate-700">Weekly summary report</span>
                        <input type="checkbox" class="w-5 h-5 accent-blue-600">
                    </label>
                </div>
            </section>

            <!-- Change Password -->
            <section class="bg-white rounded-xl shadow-sm p-8">
                <h2 class="text-xl font-bold text-slate-800 mb-6">Change Password</h2>

                <form id="passwordForm" class="space-y-5" onsubmit="return savePassword(event)">
                    <input type="password" id="currentPassword" placeholder="Current Password"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <input type="password" id="newPassword" placeholder="New Password"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <input type="password" id="confirmPassword" placeholder="Confirm New Password"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">

                    <button type="submit"
                        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        Update Password
                    </button>
                    <span id="passwordSavedMsg" class="hidden ml-3 text-emerald-600 text-sm font-medium">Password
                        updated!</span>
                </form>
            </section>
        </main>
    </div>

    <script>
        function saveGeneral(e) {
            e.preventDefault();
            const msg = document.getElementById('generalSavedMsg');
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
            return false;
        }

        function savePassword(e) {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            if (newPass !== confirmPass) {
                alert('New password and confirm password do not match.');
                return false;
            }
            const msg = document.getElementById('passwordSavedMsg');
            msg.classList.remove('hidden');
            document.getElementById('passwordForm').reset();
            setTimeout(() => msg.classList.add('hidden'), 2000);
            return false;
        }
    </script>

</body>

</html>
