            <nav class="flex-1 px-4 space-y-1 mt-2">

                <a href="categories.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-white/5 transition">

                    </svg>

                    </svg>
                    <span>Orders</span>

                <a href="users.html"

        <!-- Main -->
        <main class="flex-1 p-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-6">Order Management</h1>

            <!-- Add New Order -->
            <section class="bg-white rounded-xl shadow-sm p-8 mb-8">
                <h2 class="text-xl font-bold text-slate-800 mb-6">Add New Order</h2>

                <form id="orderForm" class="space-y-5" onsubmit="return addOrder(event)"> <select id="orderProduct"
                        required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="" disabled selected>Select Product</option>
                        <option>laptop</option>
                        <option>Mobile</option>
                    </select>

                    <input type="text" id="orderCustomer" placeholder="Customer Name" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">

                    <input type="number" id="orderQty" placeholder="Quantity" min="1" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">

                    <input type="date" id="orderDate" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">

                    <div class="flex items-center gap-4">
                        <select id="orderStatus"
                            class="border border-slate-300 rounded-lg px-3 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option>Pending</option>
                            <option>Completed</option>
                            <option>Cancelled</option>
                        </select>

                        <button type="submit"
                            class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-6 4l3 3m0 0l3-3m-3 3V2" />
                            </svg>
                            Save Order
                        </button>
                    </div>
                </form>
            </section>

            <!-- Orders List -->
            <section class="bg-white rounded-xl shadow-sm p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Orders List</h2>
                    <input type="text" id="searchInput" placeholder="Search Order..." onkeyup="filterTable()"
                        class="border border-slate-300 rounded-lg px-4 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 text-sm">
                                <th class="px-4 py-3 font-semibold">Order ID</th>
                                <th class="px-4 py-3 font-semibold">Product</th>
                                <th class="px-4 py-3 font-semibold">Customer</th>
                                <th class="px-4 py-3 font-semibold">Quantity</th>
                                <th class="px-4 py-3 font-semibold">Order Date</th>
                                <th class="px-4 py-3 font-semibold">Status</th>
                                <th class="px-4 py-3 font-semibold">Action</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody" class="divide-y divide-slate-100">
                            <!-- Rows will be added here dynamically from database -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";


        // ================= LOAD PRODUCTS =================

        function loadProducts() {

            fetch(`${API_URL}/products`)
                .then(res => res.json())
                .then(products => {

                    const select = document.getElementById("orderProduct");

                    select.innerHTML = `
            <option value="">Select Product</option>
        `;


                    products.forEach(product => {

                        select.innerHTML += `
                <option value="${product.id}">
                    ${product.name}
                </option>
            `;

                    });

                });

        }



        // ================= ADD ORDER =================

        function addOrder(event) {

            alert("Button Clicked");

            event.preventDefault();


            const data = {

                customer_name:
                    document.getElementById("orderCustomer").value,


                product_id:
                    document.getElementById("orderProduct").value,


                quantity:
                    document.getElementById("orderQty").value,


                status:
                    document.getElementById("orderStatus").value

            };



            function addOrder(event) {

                event.preventDefault();

                const data = {
                    customer_name: document.getElementById("orderCustomer").value,
                    product_id: parseInt(document.getElementById("orderProduct").value),
                    quantity: parseInt(document.getElementById("orderQty").value),
                    status: document.getElementById("orderStatus").value
                };

                console.log(data);

                fetch(`${API_URL}/orders`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                })
                    .then(async (res) => {

                        const result = await res.json();

                        console.log(result);

                        alert(result.message);

                        if (res.ok) {
                            document.getElementById("orderForm").reset();
                            loadOrders();
                        }

                    })
                    .catch(err => {
                        console.error(err);
                        alert(err);
                    });

                return false;
            }
        }



        // ================= LOAD ORDERS =================

        function loadOrders() {


            fetch(`${API_URL}/orders`)

                .then(res => res.json())

                .then(orders => {


                    const tbody =
                        document.getElementById("orderTableBody");


                    tbody.innerHTML = "";



                    orders.forEach(order => {


                        tbody.innerHTML += `

            <tr>

            <td class="px-4 py-4">
            ${order.id}
            </td>


            <td class="px-4 py-4">
            ${order.product}
            </td>


            <td class="px-4 py-4">
            ${order.customer_name}
            </td>


            <td class="px-4 py-4">
            ${order.quantity}
            </td>


            <td class="px-4 py-4">
            ${order.created_at}
            </td>


            <td class="px-4 py-4">
            ${order.status}
            </td>



            <td class="px-4 py-4">

            <button
            onclick="deleteOrder(${order.id})"
            class="bg-red-500 text-white px-3 py-1 rounded">
            Delete
            </button>

            </td>


            </tr>

            `;


                    });


                });


        }



        // ================= DELETE ORDER =================


        function deleteOrder(id) {


            if (!confirm("Delete this order?"))
                return;


            fetch(`${API_URL}/orders/${id}`,
                {

                    method: "DELETE"

                })

                .then(res => res.json())

                .then(data => {

                    alert(data.message);

                    loadOrders();

                });


        }



        // ================= START =================

        loadProducts();

        loadOrders();
    </script>

</body>
